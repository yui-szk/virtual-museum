services:
  - type: web
    name: backend
    runtime: docker
    dockerfilePath: app/backend/Dockerfile
    dockerContext: app/backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      # フロントエンドの公開URL（例: https://frontend-xxxx.onrender.com）を
      # Renderダッシュボードで設定する（sync: false のため同期時に入力を求められる）
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DB_HOST
        fromDatabase:
          name: appdb
          property: host
      - key: DB_PORT
        fromDatabase:
          name: appdb
          property: port
      - key: DB_USER
        fromDatabase:
          name: appdb
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: appdb
          property: password
      - key: DB_NAME
        fromDatabase:
          name: appdb
          property: database

  - type: web
    name: frontend
    runtime: static
    buildCommand: |
      cd app/frontend
      npm ci
      npm run build
    staticPublishPath: app/frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # バックエンドの公開URL（例: https://backend-xxxx.onrender.com）を
      # Renderダッシュボードで設定する（sync: false のため同期時に入力を求められる）
      - key: VITE_API_BASE_URL
        sync: false

databases:
  - name: appdb
    plan: free
    databaseName: appdb
    user: app
